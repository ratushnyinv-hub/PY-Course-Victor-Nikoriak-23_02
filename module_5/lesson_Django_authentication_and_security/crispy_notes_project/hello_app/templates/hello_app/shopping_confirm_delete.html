{% extends 'layouts/dashboard.html' %}

{% block topbar_title %}Видалити список{% endblock %}

{% block content %}
<div class="row">
  <div class="col-md-6">
    <div class="card shadow-sm border-danger">
      <div class="card-header bg-danger bg-opacity-10 text-danger">
        <h5 class="mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Видалення списку</h5>
      </div>
      <div class="card-body">
        <p>Видалити список <strong>«{{ sl.title }}»</strong> разом із усіма товарами?</p>
        <p class="text-muted small">Цю дію неможливо скасувати.</p>
        <form method="post" class="d-flex gap-2 mt-3">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">
            <i class="bi bi-trash me-1"></i>Так, видалити
          </button>
          <a href="{% url 'hello_app:shopping_detail' sl.pk %}" class="btn btn-outline-secondary">
            Скасувати
          </a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
