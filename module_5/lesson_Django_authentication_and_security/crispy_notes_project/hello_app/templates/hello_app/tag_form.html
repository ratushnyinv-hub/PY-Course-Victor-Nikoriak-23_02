{% extends 'layouts/dashboard.html' %}
{% load crispy_forms_tags %}

{% block topbar_title %}{{ title }}{% endblock %}

{% block content %}
<div class="row">
  <div class="col-lg-5">
    <div class="card shadow-sm">
      <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-tags me-2"></i>{{ title }}</h6>
      </div>
      <div class="card-body">
        {% crispy form %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
