{% extends 'base.html' %}

{% block title %}Відновлення паролю — CrispyNotes{% endblock %}

{% block body %}
<div class="min-vh-100 d-flex align-items-center justify-content-center">
  <div class="card shadow-sm" style="width: 420px;">
    <div class="card-body p-4">

      <div class="text-center mb-4">
        <i class="bi bi-key display-4 text-warning"></i>
        <h5 class="fw-bold mt-2 mb-0">Відновлення паролю</h5>
        <p class="text-muted small">
          Введіть email — надішлемо посилання для скидання.
        </p>
      </div>

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label for="{{ form.email.id_for_label }}" class="form-label fw-semibold">Email</label>
          <input type="email"
                 name="{{ form.email.html_name }}"
                 id="{{ form.email.id_for_label }}"
                 class="form-control {% if form.email.errors %}is-invalid{% endif %}"
                 placeholder="your@email.com"
                 autofocus>
          {% for error in form.email.errors %}
            <div class="invalid-feedback">{{ error }}</div>
          {% endfor %}
        </div>
        <button type="submit" class="btn btn-warning w-100">
          <i class="bi bi-envelope me-1"></i>Надіслати посилання
        </button>
      </form>

      <hr class="my-3">
      <p class="text-center text-muted small mb-0">
        <a href="{% url 'login' %}">Повернутись до входу</a>
      </p>

    </div>
  </div>
</div>
{% endblock %}
